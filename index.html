<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="/assets/js/registration.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.3/font/bootstrap-icons.min.css"
        integrity="sha512-YFENbnqHbCRmJt5d+9lHimyEMt8LKSNTMLSaHjvsclnZGICeY/0KYEeiHwD1Ux4Tcao0h60tdcMv+0GljvWyHg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="container">
        <div class="row justify-content-center py-5 column-gap-md-4">
            <div class="col-4 bg-dark-subtle rounded-3">
                <h2 class="text-center mt-3">Midterm - Final Calculator</h2>
                <hr>

                <label for="name">Name - Surname</label>
                <input id="name" type="text" class="form-control mb-3" placeholder="Ahmet Kasım Erbay">

                <label for="midterm">Midterm Grade</label>
                <input id="midterm" type="text" class="form-control mb-3" max="100" min="0" step="0.1" value="100">

                <label for="final">Final Grade</label>
                <input id="final" type="text" class="form-control mb-3" max="100" min="0" step="0.1" value="100">

                <button class="btn btn-primary form-control mb-3" onclick="calculate()">Hesapla</button>

            </div>
            <div class="col-7 bg-secondary-subtle rounded-3">
                <h2 class="text-center">Student List</h2>
                <hr>
                <table class="table table-hover table-bordered">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name Surname</th>
                            <th>Midterm</th>
                            <th>Final</th>
                            <th>Average</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody id="list">

                    </tbody>
                </table>

            </div>
        </div>
    </div>
</body>

</html>
