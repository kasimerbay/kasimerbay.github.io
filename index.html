<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Counter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-aFq/bzH65dt+w6FI2ooMVUpc+21e0SRygnTpmBvdBgSdnuTN7QbdgL+OapgHtvPp" crossorigin="anonymous">
    <link rel="stylesheet" href="/Counter/style.css">
</head>

<body>
    <div class="container-fluid">
        <div class="row justify-content-center bg-white" style="height: 100vh">
            <div class="col-12 p-5 d-flex justify-content-center" style="margin: auto 0;">
                <div class="card w-75">
                    <div class="card-header">
                        <h2 class="text-center display-2">Özel Gün Sayacı</h2>
                    </div>
                    <div class="card-body w-75 mx-auto p-2">
                        <div class="container-fluid">
                            <div class="row justify-content-center d-flex flex-fill">

                                <div id="number-frame"
                                    class="col-xl-2 col-sm-5 bg-body text-center border rounded-2 m-1">
                                    <h3 class="text-center text-muted">Gün</h3>
                                    <p class="text-center display-5">180</p>
                                </div>

                                <div id="number-frame"
                                    class="col-xl-2 col-sm-5 bg-body text-center border rounded-2 m-1">
                                    <h3 class="text-center text-muted">Saat</h3>
                                    <p class="text-center display-5">07</p>
                                </div>

                                <div id="number-frame"
                                    class="col-xl-2 col-sm-5 bg-body text-center border rounded-2 m-1">
                                    <h3 class="text-center text-muted">Dakika</h3>
                                    <p class="text-center display-5">25</p>
                                </div>

                                <div id="number-frame"
                                    class="col-xl-2 col-sm-5 bg-body text-center border rounded-2 m-1">
                                    <h3 class="text-center text-muted">Saniye</h3>
                                    <p class="text-center display-5">10</p>
                                </div>

                            </div>
                        </div>
                    </div>
                    <div class="card-footer text-center">
                        <button id="button" class="btn btn-warning w-75 opacity-75"> <b> Bana Tıkla </b> </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/Counter/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-qKXV1j0HvMUeCBQ+QVp7JcfGl760yU08IQ+GpUo5hlbpg51QRiuqHAJz8+BrxE/N" crossorigin="anonymous">
        </script>
</body>

</html>
